name: Build and Push to Zot

on:
  push:
    branches:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Step 0: Set Ingress Host based on branch
      # ------------------------------------------------------------------
      - name: Set Environment Variables
        run: |
          # Sanitize branch name for DNS compatibility (lowercase and replace / with -)
          SANITISED_BRANCH=$(echo ${GITHUB_REF_NAME} | tr '[:upper:]' '[:lower:]' | tr '/' '-')
          
          if [ "${SANITISED_BRANCH}" == "main" ]; then
            echo "INGRESS_HOST=api.bmd.ambrizal.net" >> $GITHUB_ENV
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          else
            echo "INGRESS_HOST=${SANITISED_BRANCH}.api.bmd.ambrizal.net" >> $GITHUB_ENV
            echo "IMAGE_TAG=${SANITISED_BRANCH}" >> $GITHUB_ENV
          fi

      # ------------------------------------------------------------------
      # Step 1: Pull all secrets from your self-hosted Infisical instance.
      # ------------------------------------------------------------------
      - name: Fetch Secrets from Infisical
        uses: Infisical/secrets-action@v1.0.7
        with:
          method: "universal-auth"
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: "my-app"
          env-slug: "prod"
          domain: "https://secrets.bmd.ambrizal.net"
          export-type: env

      # ------------------------------------------------------------------
      # Step 2: Login to your private Zot registry.
      # ------------------------------------------------------------------
      - name: Login to Private Registry
        uses: docker/login-action@v3
        with:
          registry: registry.bmd.ambrizal.net
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASS }}

      # ------------------------------------------------------------------
      # Step 3: Build and push the Docker image.
      # ------------------------------------------------------------------
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: registry.bmd.ambrizal.net/my-app/backend:${{ env.IMAGE_TAG }}

      # ------------------------------------------------------------------
      # Step 4: Set up kubectl using KUBECONFIG from Infisical.
      # ------------------------------------------------------------------
      - name: Set up Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ env.KUBECONFIG_DATA }}

      - name: Deploy to K3s Cluster
        run: |
          # Replace placeholders in manifests
          envsubst < ./deployment/backend-ingress.yaml > ./deployment/backend-ingress-final.yaml
          envsubst < ./deployment/backend-deployment.yaml > ./deployment/backend-deployment-final.yaml
          
          # Apply manifests
          kubectl apply -f ./deployment/backend-deployment-final.yaml
          kubectl apply -f ./deployment/backend-service.yaml
          kubectl apply -f ./deployment/backend-ingress-final.yaml

          # Force a rolling update
          kubectl rollout restart deployment/backend-deployment -n dev
