# ============================================================
# InfisicalSecret — Syncs secrets from Infisical into a
# native Kubernetes Secret that pods can use via envFrom.
#
# How it works:
#   1. The Infisical Operator reads this resource.
#   2. It authenticates with your Infisical instance using
#      the Machine Identity credentials stored in the
#      'infisical-auth' Kubernetes Secret (created below).
#   3. It creates/updates a native K8s Secret called
#      'backend-secrets' inside the 'dev' namespace.
#   4. Your pods mount that secret as environment variables.
# ============================================================

# Step 1: Store the Infisical Machine Identity credentials as a K8s Secret.
# Replace the placeholder values with your actual credentials from Infisical.
# (Project Settings > Machine Identities > Create)
apiVersion: v1
kind: Secret
metadata:
  name: infisical-auth
  namespace: dev
type: Opaque
stringData:
  clientId: "REPLACE_WITH_INFISICAL_CLIENT_ID"         # From Infisical Machine Identity
  clientSecret: "REPLACE_WITH_INFISICAL_CLIENT_SECRET"  # From Infisical Machine Identity
---
# Step 2: Define which Infisical project/environment to sync,
# and what K8s Secret to create (managedSecretReference).
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: backend-infisical-secret
  namespace: dev
spec:
  hostAPI: "https://secrets.bmd.ambrizal.net/api" # Your self-hosted Infisical API URL
  resyncInterval: 60                               # Re-sync every 60 seconds

  authentication:
    universalAuth:
      secretsScope:
        projectSlug: "my-app"       # IMPORTANT: Replace with your Infisical project slug
        envSlug: "prod"             # IMPORTANT: Replace with your environment (dev/staging/prod)
        secretsPath: "/"            # Path inside the project (/ = root)
      credentialsRef:
        secretName: "infisical-auth"
        secretNamespace: "dev"

  managedSecretReference:
    secretName: "backend-secrets"   # The K8s Secret that will be created/synced
    secretNamespace: "dev"
